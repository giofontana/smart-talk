name: "Smart Talk"
description: "AI-powered conversation agent with speech-to-text and text-to-speech for Home Assistant"
version: "1.0.0"
slug: "smart_talk"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
ports:
  10300/tcp: null   # STT Wyoming port (null = not exposed to host by default, HA maps internally)
  10301/tcp: null   # TTS Wyoming port
  8080/tcp: 8080    # Conversation proxy HTTP port
options:
  agent_url: "http://localhost:8765/conversation"
  stt_model: "tiny"
  stt_language: "auto"
  tts_voice: "en_US-lessac-medium"
  tts_language: "en"
schema:
  agent_url: str
  stt_model: "tiny|base|small|medium|large-v2|large-v3"
  stt_language: str
  tts_voice: str
  tts_language: str
map:
  - share:rw
startup: services
boot: auto
