name: "Smart Talk"
description: "AI-powered conversation agent with speech-to-text and text-to-speech for Home Assistant"
version: "1.0.0"
slug: "smart_talk"
url: "https://github.com/giofontana/smart-talk"
init: false
arch:
  - aarch64
  - amd64
ports:
  10300/tcp: 10300
  10301/tcp: 10301
  8080/tcp: 8080
options:
  agent_url: "http://localhost:8765/conversation"
  stt_model: "tiny"
  stt_language: "auto"
  tts_voice: "en_US-lessac-medium"
  tts_language: "en"
schema:
  agent_url: str
  stt_model: str
  stt_language: str
  tts_voice: str
  tts_language: str
map:
  - share:rw
startup: services
boot: auto
