name: Wyoming Polyglot Proxy
description: Wyoming protocol proxy with automatic language detection and voice mapping for multilingual TTS
version: "0.1.0"
slug: wyoming-polyglot-proxy
url: https://github.com/giofontana/smart-talk/tree/main/wyoming-proxy-addon
startup: application
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
ports:
  10300/tcp: 10300
  10200/tcp: 10200
options:
  whisper_url: tcp://192.168.1.100:10300
  piper_url: tcp://192.168.1.100:10200
  voice_mapping:
    en: en_US-lessac-medium
    es: es_ES-mls-medium
    it: it_IT-riccardo-x_low
    pt: pt_BR-faber-medium
    fr: fr_FR-siwis-medium
  log_level: info
schema:
  whisper_url: str
  piper_url: str
  voice_mapping: dict?
  log_level: list(debug|info|warning|error)?
