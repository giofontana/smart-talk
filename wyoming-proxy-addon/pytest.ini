[pytest]
testpaths = tests
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

markers =
    unit: Unit tests (fast, no I/O)
    integration: Integration tests (mocked I/O)
    e2e: End-to-end tests (full flow)
    slow: Slow-running tests

addopts =
    -v
    --strict-markers
    --tb=short
    --cov=src
    --cov-report=term-missing
    --cov-report=html
